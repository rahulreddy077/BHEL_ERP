services:
  - type: web
    name: bhel-erp
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application --chdir backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bhel-erp-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: RENDER_EXTERNAL_HOSTNAME
        sync: false

databases:
  - name: bhel-erp-db
    plan: free
